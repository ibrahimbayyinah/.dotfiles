# This is an example Hyprland config file.
#
# Refer to the wiki for more information.

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,preferred,auto,auto,transform,0
# monitor=HDMI-A-2,1920x1080@74.99,auto,auto,transform,0
# monitor=HDMI-A-2,1920x1080@74.99,auto,auto,transform,0,mirror,eDP-1
# monitor=HDMI-A-2,preferred,auto,1
# monitor=HDMI-A-1,preferred,auto,1
# monitor=DVI-I-1,1280x1024@75.03,auto,auto,transform,0
monitor=DVI-I-1,1600x900,auto,auto,transform,0
# monitor=DP-4,1440x900@119.85,auto,auto,transform,0
# monitor=DP-4,1920x1080,auto,1,transform,0
# monitor=DP-5,1920x1080,auto,1,transform,0


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox
exec-once = mako & /usr/lib/polkit-kde-authentication-agent-1 & udiskie & waybar # & wlsunset -l $WL_LAT -L $WL_LON & XDG_MENU_PREFIX=arch- kbuildsycoca6
exec-once = hyprpm reload -n
exec-once = ~/.local/scripts/xdph-nuke.sh
# exec-once = ~/.local/scripts/auto_rotation.sh
exec-once = [workspace 0] keepassxc

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = kitty
# $fileManager = dolphin
$fileManager = nemo
$menu = wofi --show drun
$webbrowser = firefox -p

# Some default env vars.
env = XCURSOR_SIZE,24
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland,x11
env = CLUTTER_BACKEND,wayland

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct # Tells Qt based applications to pick your theme from qt5ct, use with Kvantum. Change to qt6ct if you have that

# File association in dolphin.
env = XDG_MENU_PREFIX,arch-

# Electron apps (like Signal)
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# unscale XWayland
xwayland {
  force_zero_scaling = true
}

# toolkit-specific scale
# env = GDK_SCALE,2
# env = XCURSOR_SIZE,32

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us,us,ara,be
    kb_variant = ,intl,mac,
    kb_model =
    kb_options = caps:swapescape,altwin:menu_win,grp:lctrl_lshift_toggle,lv3:lalt_switch
    kb_rules =

    follow_mouse = 1

    touchpad {
    	disable_while_typing = true
        natural_scroll = true
	tap-to-click = true
    }

    sensitivity = 0.2 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    float_switch_override_focus = 2
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 2
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    resize_on_border = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10

    # active_opacity = 1.0
    # inactive_opacity = 0.8
    
    # battery optimisation
    shadow {
    	enabled = false
    }

    blur {
        enabled = false
        size = 3
        passes = 1
        
	ignore_opacity = false
        vibrancy = 0.1696
	new_optimizations = true
    }

    # drop_shadow = false
    # shadow_range = 4
    # shadow_render_power = 3
    # col.shadow = rgba(1a1a1aee)

    dim_inactive = false
    dim_strength = 0.1
}

animations {
    enabled = false

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
    new_status = master
}

gesture = 3, horizontal, workspace
gesture = 3, up, mod: SUPER, scale: 1.5, fullscreen
gesture = 3, left, mod: SUPER, scale: 1.5, float
gesture = 2, pinchout, mod: SUPER, dispatcher, exec zoom increase

gestures {
    # workspace_swipe = true
    # workspace_swipe_fingers = 3
    workspace_swipe_cancel_ratio = 0.15
    workspace_swipe_touch = true
    workspace_swipe_invert = true
}

# gestures {
#     # See https://wiki.hyprland.org/Configuring/Variables/ for more
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
#     workspace_swipe_cancel_ratio = 0.15
# }

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 to disable the anime mascot wallpapers
    # disable_hyprland_logo = true
    disable_splash_rendering = true
    # force_hypr_chan = false
    #
    animate_manual_resizes = false

    enable_swallow = true

    # new_window_takes_over_fullscreen = 2 # new window will make fullscreen window unfullscreen


    vfr = true
}

cursor {
    zoom_factor = 1.0
    zoom_rigid = true
    
}

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
    scroll_event_delay = 10
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
# device {
# epic-mouse-v1 {
#     sensitivity = -0.5
# } }

device {
    name = "ELAN Touchscreen"
    enabled = false
}

plugin:touch_gestures {
#   touch_gestures {
    # The default sensitivity is probably too low on tablet screens,
    # I recommend turning it up to 4.0
    sensitivity = 4.0

    # must be >= 3
    workspace_swipe_fingers = 3

    workspace_swipe_edge = d

    # in milliseconds
    long_press_delay = 400

    # in pixels, the distance from the edge that is considered an edge
    edge_margin = 20

    # binds
    hyprgrass-bind = , edge:d:u, exec, nwg-drawer
    hyprgrass-bind = , edge:u:d, fullscreen, 1
    # hyprgrass-bind = , swipe:3:ld, killactive,
    hyprgrass-bind = , swipe:3:u, killactive,
    hyprgrass-bind = , edge:r:u, exec, changevolume up
    hyprgrass-bind = , edge:r:d, exec, changevolume down
    # longpress can trigger mouse binds:
    hyprgrass-bindm = , longpress:2, movewindow
    hyprgrass-bindm = , longpress:3, resizewindow

    experimental {
      # send proper cancel events to windows instead of hacky touch_up events,
      # NOT recommended as it crashed a few times, once it's stabilized I'll make it the default
      send_cancel = 0
    }

#   }
}
# Plugin config
# plugin {
#     touch_gestures {
#         sensitivity = 1.0
# 
# 	workspace_swipe_edge = l
#     }
# }
# plugin:touch_gestures {
#     sensitivity = 4.0
# 
#     workspace_swipe_edge = l
# }
# bind = , edge:d:u, exec, firefox
# bind = , edge:r:l, workspace, +1
# bind = , edge:d:u

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

windowrulev2 = float,class:(galculator),title:(galculator)


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, B, exec, $webbrowser
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, U, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse:274, exec, zoom reset

# zoom
binde = $mainMod, equal, exec, zoom increase
binde = $mainMod, minus, exec, zoom decrease
bind = $mainMod SHIFT, equal, exec, zoom reset
bind = $mainMod, mouse_up, exec, zoom decrease
bind = $mainMod, mouse_down, exec, zoom increase

# Window binds
bind = $mainMod, M, fullscreen, 1
bind = $mainMod_ALT, M, fullscreen, 0
bind = $mainMod_SHIFT, M, fullscreenstate, -1

# Apps & scripts
# bind=,Print,exec,grim -g "$(slurp)"
# bind=$mainMod,Print,exec,grim
bind=,Print,exec,grimblast --notify --cursor copysave area
bind=$mainMod,Print,exec,grimblast --notify --cursor copysave output
bind=SHIFT,Print,exec,grimblast --notify --cursor copy area
bind=$mainMod_SHIFT,Print,exec,grimblast --notify --cursor edit area
bind = $mainMod, N, exec, ~/.local/scripts/mount_nash.sh

binde = , XF86AudioRaiseVolume, exec, changevolume up
binde = , XF86AudioLowerVolume, exec, changevolume down
bind = , XF86AudioMute, exec, changevolume mute
binde = , XF86MonBrightnessUp, exec, changebrightness up
binde = , XF86MonBrightnessDown, exec, changebrightness down

bind = $mainMod, grave, exec, wofi-emoji

# Switch binds
# bindl = , switch:Lenovo Yoga Tablet Mode Control switch, exec, laptop-flip.sh eDP-1
# bindl = , switch:ThinkPad Extra Buttons, exec, laptop-flip.sh eDP-1
bindl = , switch:on:ThinkPad Extra Buttons, exec, auto_rotation.sh
bindl = , switch:off:ThinkPad Extra Buttons, exec, pkill -f auto_rotation.sh
bindl = , switch:Lid Switch, exec, swaylock

# TEST
# bindl = $mainMod, S, hyprctl keyword device:synps/2-synaptics-touchpad:enabled false
# bindl = $mainMod_SHIFT, S, hyprctl keyword device:synps/2-synaptics-touchpad:enabled true

# For screensharing
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# https://gist.github.com/PowerBall253/2dea6ddf6974ba4e5d26c3139ffb7580#editing-the-configuration-file
